site_name: CS Wiki
site_description: 컴퓨터 과학 학습 정리
site_author: yunhwane
repo_url: https://github.com/yunhwane/cs-wiki
repo_name: yunhwane/cs-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ko
        - en
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - 홈: index.md
  - 운영체제:
      - os/index.md
  - 네트워크:
      - network/index.md
  - 데이터베이스:
      - database/index.md
  - 자료구조:
      - data-structure/index.md
  - 알고리즘:
      - algorithm/index.md
  - 시스템 디자인:
      - system-design/index.md
  - 언어:
      - language/index.md
  - 보안:
      - security/index.md
  - Git:
      - git/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yunhwane
